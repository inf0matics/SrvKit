<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>service — tsp.tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<style>
  /* tsp.tools Landing Page Template
     Tokens from architecture/design-system.md — dark default + light toggle.
     Replace: logo.svg, service name, tagline, CTA label, footer env-var links. */

  :root {
    --bg:#212529; --surface:#2b3035; --border:#404041;
    --text:#f0f0f0; --text-muted:#adb5bd; --text-dim:#8b9197;
    --primary:#fbad18; --accent:#f7941e; --on-primary:#212529;
    --r:0.75rem; --r-sm:0.5rem;
  }
  [data-theme="light"] {
    --bg:#f8f9fa; --surface:#ffffff; --border:#dee2e6;
    --text:#212529; --text-muted:#6d6e70; --text-dim:#9aa0a6;
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Nunito',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100svh;          /* svh = stable viewport — avoids mobile browser chrome issues */
    display:flex; flex-direction:column;
  }
  iconify-icon { display:inline-block; vertical-align:middle; line-height:1; }

  /* ── Main ── */
  .main {
    flex:1;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:48px 24px 32px;
    text-align:center;
  }

  /* Hero wordmark */
  .hero { display:flex; align-items:center; gap:18px; margin-bottom:28px; }
  .logo-wrap {
    width:72px; height:72px; flex-shrink:0;
    border-radius:22%; border:4px solid rgba(240,240,240,.8);
    overflow:hidden; display:flex; align-items:center; justify-content:center;
    background:var(--surface);
  }
  [data-theme="light"] .logo-wrap { border-color:rgba(33,37,41,.8); }
  .logo-wrap img { width:100%; height:100%; object-fit:cover; }
  .wordmark {
    font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:clamp(2.5rem, 8vw, 4rem); line-height:1; letter-spacing:-.02em;
    color:var(--text);
  }
  .wordmark .dot { color:var(--primary); }

  /* Tagline */
  .tagline {
    max-width:480px; font-size:1rem; font-weight:600;
    color:var(--text-muted); line-height:1.6; margin-bottom:36px;
  }

  /* CTA */
  .btn-cta {
    display:inline-flex; align-items:center; gap:8px;
    background:var(--primary); color:var(--on-primary);
    font:inherit; font-weight:800; font-size:1rem;
    padding:12px 28px; border-radius:var(--r-sm);
    border:none; cursor:pointer; text-decoration:none;
    transition:background .15s;
  }
  .btn-cta:hover { background:var(--accent); }
  .btn-cta iconify-icon { font-size:18px; }

  /* ── Theme toggle (top right, aligned to content width) ── */
  .theme-top-bar {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:center;
    pointer-events:none;
  }
  .theme-top-inner {
    width:100%; max-width:896px;
    padding:14px 24px;
    display:flex; justify-content:flex-end;
  }
  .theme-btn-top {
    pointer-events:auto;
    background:none; border:none; cursor:pointer; padding:6px;
    color:var(--text-muted); display:inline-flex; align-items:center;
    border-radius:var(--r-sm); transition:color .15s;
  }
  .theme-btn-top:hover { color:var(--text); background:var(--surface); }
  .theme-btn-top iconify-icon { font-size:20px; }

  /* ── Footer ── */
  footer {
    padding:16px 20px 20px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    text-align:center;
  }

  .footer-links {
    display:flex; align-items:center; justify-content:center;
    flex-wrap:wrap; gap:6px 18px;
  }

  .footer-link {
    font-size:12px; color:var(--text-muted); text-decoration:none;
    display:inline-flex; align-items:center; gap:4px;
  }
  .footer-link:hover { color:var(--text); }
  .footer-link iconify-icon { font-size:14px; }

  .ver-badge {
    font-size:11px; color:var(--text-muted);
    border:1px solid var(--border); border-radius:999px; padding:1px 9px;
  }


  .footer-tagline {
    font-size:11px; color:var(--text-dim);
  }
</style>
</head>
<body>

<!-- Theme toggle — top right, aligned to content max-width -->
<div class="theme-top-bar">
  <div class="theme-top-inner">
    <button class="theme-btn-top" id="themeToggle" type="button" title="Toggle theme">
      <iconify-icon id="themeIcon" icon="tabler:sun"></iconify-icon>
    </button>
  </div>
</div>

<main class="main">
  <!-- Hero wordmark: replace "service" and logo.svg -->
  <div class="hero">
    <div class="logo-wrap">
      <img src="/logo.svg" alt="logo" onerror="this.style.display='none'">
    </div>
    <div class="wordmark">service<span class="dot">.</span></div>
  </div>

  <!-- Tagline: replace with service description (1–2 sentences) -->
  <p class="tagline">
    A short description of what this service does and who it's for.
    Keep it to two sentences max.
  </p>

  <!-- CTA: triggers Logto sign-in -->
  <a href="/auth/sign-in" class="btn-cta">
    <iconify-icon icon="tabler:login"></iconify-icon>
    Sign in
  </a>
</main>

<!-- Footer
     Env-var driven: IMPRINT_URL, PRIVACY_URL, TIP_JAR_URL
     Hide items whose URL is not set. Version read from package.json at build time. -->
<footer>
  <div class="footer-links">
    <!-- Imprint — hide if IMPRINT_URL not set -->
    <a href="#" class="footer-link" target="_blank" rel="noopener">
      <iconify-icon icon="tabler:file-description"></iconify-icon>
      Imprint
    </a>

    <!-- Privacy — hide if PRIVACY_URL not set -->
    <a href="#" class="footer-link" target="_blank" rel="noopener">
      <iconify-icon icon="tabler:shield"></iconify-icon>
      Privacy
    </a>

    <!-- Tip Jar — default https://thespielplatz.com/tip-jar -->
    <a href="https://thespielplatz.com/tip-jar" class="footer-link" target="_blank" rel="noopener">
      <iconify-icon icon="tabler:heart"></iconify-icon>
      Tip Jar
    </a>

    <!-- Version badge — replace v0.0.1 at build time -->
    <span class="ver-badge">v0.0.1</span>
  </div>

  <!-- Tagline -->
  <p class="footer-tagline">A tool of tsp.tools</p>
</footer>

<script>
  const html = document.documentElement
  const icon = document.getElementById('themeIcon')

  document.getElementById('themeToggle').addEventListener('click', () => {
    const dark = html.dataset.theme === 'dark'
    html.dataset.theme = dark ? 'light' : 'dark'
    icon.setAttribute('icon', dark ? 'tabler:moon' : 'tabler:sun')
  })
</script>
</body>
</html>
